<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <rect width="48" height="48" rx="12" fill="#0e1a10"/>
  <rect width="48" height="48" rx="12" fill="url(#bg)"/>
  <!-- Mountain path shape -->
  <path d="M8 36 L18 20 L24 26 L32 14 L40 36 Z" fill="url(#mountain)" opacity="0.15"/>
  <!-- Trail line -->
  <path d="M8 36 Q14 24 20 22 Q26 20 30 16 Q34 12 40 14" stroke="url(#trail)" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  <!-- Summit dot -->
  <circle cx="40" cy="14" r="3.5" fill="#F7D89D"/>
  <circle cx="40" cy="14" r="6" fill="#F7D89D" opacity="0.18"/>
  <!-- Start dot -->
  <circle cx="8" cy="36" r="2.5" fill="#75A37B"/>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="48" y2="48">
      <stop offset="0%" stop-color="#142018"/>
      <stop offset="100%" stop-color="#0a120c"/>
    </linearGradient>
    <linearGradient id="trail" x1="8" y1="36" x2="40" y2="14">
      <stop offset="0%" stop-color="#75A37B"/>
      <stop offset="100%" stop-color="#F7D89D"/>
    </linearGradient>
    <linearGradient id="mountain" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#75A37B"/>
      <stop offset="100%" stop-color="#F7D89D"/>
    </linearGradient>
  </defs>
</svg>
